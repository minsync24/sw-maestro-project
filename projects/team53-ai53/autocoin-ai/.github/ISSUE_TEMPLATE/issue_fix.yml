name: "🧩 Fix"
description: "버그 수정 또는 잘못된 문서/설정 수정"
labels: ["fix"]
body:
  - type: textarea
    attributes:
      label: 📄 설명
      description: 어떤 문제가 있었는지, 현재 기준에서 무엇이 잘못되었는지 설명해주세요.
    validations:
      required: true
  - type: textarea
    attributes:
      label: ✅ 작업 항목
      description: 할 일을 체크박스 형태로 작성해주세요. 재현 원인과 수정 후 확인 항목을 함께 적으면 좋습니다.
      placeholder: |
        - [ ] 원인 파악
        - [ ] 수정
        - [ ] 확인
    validations:
      required: true
  - type: textarea
    attributes:
      label: 🙋🏻 참고 자료
      description: 에러 로그, 관련 이슈, 참고 링크가 있다면 작성해주세요.