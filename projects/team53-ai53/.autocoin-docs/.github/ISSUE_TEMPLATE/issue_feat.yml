name: "✨ Feat"
description: "새로운 기능 추가"
labels: ["feat"]
body:
  - type: textarea
    attributes:
      label: 📄 설명
      description: 어떤 기능을 왜 추가하는지, Coin Agent 문서 범위에서 어떤 문제를 해결하는지 작성해주세요.
      placeholder: 자세히 적을수록 좋습니다!
    validations:
      required: true
  - type: textarea
    attributes:
      label: ✅ 작업할 내용
      description: 할 일을 체크박스 형태로 작성해주세요. 문서 수정이면 관련 문서 동기화 항목도 포함해주세요.
      placeholder: 최대한 세분화 해서 적어주세요!
    validations:
      required: true
  - type: textarea
    attributes:
      label: 🙋🏻 참고 자료
      description: 참고 자료가 있다면 작성해 주세요.
