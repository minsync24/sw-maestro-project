name: '이슈 생성'
description: 'Repo에 이슈를 생성합니다.'
title: '작업 내용을 한 줄로 요약해주세요'

body:
  - type: dropdown
    id: type
    attributes:
      label: '🏷️ 작업 유형'
      description: '현재 저장소의 브랜치/커밋 규칙에 맞는 타입을 선택해주세요.'
      options:
        - feat
        - fix
    validations:
      required: true

  - type: input
    id: branchSlug
    attributes:
      label: '🌳 브랜치 설명 (slug)'
      description: '영문 소문자, 숫자, 하이픈만 사용해주세요. 이슈 생성 후 `{type}/{issue-number}-{slug}` 형식의 브랜치가 자동 생성됩니다.'
      value: 'update-pr-template'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: '📝 상세 내용 (Description)'
      description: '이슈 설명과 할 일(TODO)을 함께 작성해주세요. 현재 문서 기준, 안전 규칙, 영향 범위를 드러내면 좋습니다.'
      value: |
        이슈에 대한 설명

        ### ✅ TO-DO LIST
        - [ ] Task1
        - [ ] Task2
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: '📌 기타 사항'
      description: |
        참고사항, 논의 필요 사항, 관련 문서 링크, 스크린샷 링크
      placeholder: |
        - 관련 문서 링크 (예: README.md, SPEC.md, ARCHITECTURE.md)
        - 논의가 필요한 부분
        - 추후 작업 예정 사항
    validations:
      required: false
