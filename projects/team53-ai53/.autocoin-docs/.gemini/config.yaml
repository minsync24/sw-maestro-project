# Gemini Code Assist GitHub 설정 — Coin Agent 문서 리뷰
# 프로젝트: Binance Spot Testnet 전용 Coin Agent 문서 레포지토리

have_fun: false

memory_config:
  disabled: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 25
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: false

# 리뷰 제외 패턴
ignore_patterns:
  # 자동화 워크플로 및 바이너리 자산
  - ".github/workflows/**"
  - "CHANGELOG*.md"
  - "*.pdf"
